<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Predictor de Fumadores</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e6e6e6;
           display: flex; justify-content: center; padding: 30px 15px; }
    .card { background: #1b1f2a; padding: 28px; border-radius: 16px; width: 100%;
            max-width: 420px; box-shadow: 0 10px 40px rgba(0,0,0,.4); }
    h1 { font-size: 1.4rem; margin: 0 0 4px; }
    p.sub { color: #9aa0aa; margin-top: 0; font-size: .9rem; }
    label { display: block; margin: 16px 0 4px; font-size: .9rem; color: #c7ccd6; }
    input[type=range] { width: 100%; }
    select { width: 100%; padding: 8px; border-radius: 8px; background: #0f1117;
             color: #e6e6e6; border: 1px solid #333; }
    .val { float: right; color: #7aa2f7; font-weight: 600; }
    button { width: 100%; margin-top: 22px; padding: 13px; border: none; border-radius: 10px;
             background: #7aa2f7; color: #0f1117; font-size: 1rem; font-weight: 700; cursor: pointer; }
    button:hover { background: #93b5ff; }
    #resultado { margin-top: 22px; text-align: center; font-size: 1.15rem; font-weight: 700;
                 padding: 16px; border-radius: 10px; display: none; }
    .fuma { background: #3b1f24; color: #ff8d94; }
    .nofuma { background: #1f3b29; color: #8df0a8; }
    #prob { font-size: .9rem; font-weight: 400; color: #c7ccd6; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚬 Predictor de Fumadores</h1>
    <p class="sub">Cargá los datos de una persona y el modelo predice si fuma.</p>

    <label>Género</label>
    <select id="gender">
      <option value="1">Hombre</option>
      <option value="0">Mujer</option>
    </select>

    <label>Edad <span class="val" id="vEdad">45</span></label>
    <input type="range" id="age" min="20" max="85" value="45" />

    <label>Altura (cm) <span class="val" id="vAltura">165</span></label>
    <input type="range" id="height" min="130" max="190" value="165" />

    <label>Peso (kg) <span class="val" id="vPeso">65</span></label>
    <input type="range" id="weight" min="30" max="135" value="65" />

    <label>Hemoglobina <span class="val" id="vHemo">0.59</span></label>
    <input type="range" id="hemoglobin" min="0.2" max="0.9" step="0.01" value="0.59" />

    <label>Triglicéridos <span class="val" id="vTrig">1.0</span></label>
    <input type="range" id="triglyceride" min="0.1" max="8" step="0.1" value="1.0" />

    <label>Gtp (hígado) <span class="val" id="vGtp">1.0</span></label>
    <input type="range" id="Gtp" min="0.2" max="8" step="0.1" value="1.0" />

    <button onclick="predecir()">🔮 ¿Es fumador?</button>

    <div id="resultado">
      <div id="texto"></div>
      <div id="prob"></div>
    </div>
  </div>

  <script>
    const refs = {age:"vEdad", height:"vAltura", weight:"vPeso",
                  hemoglobin:"vHemo", triglyceride:"vTrig", Gtp:"vGtp"};
    for (const id in refs) {
      const el = document.getElementById(id);
      el.addEventListener("input", () => document.getElementById(refs[id]).textContent = el.value);
    }

    async function predecir() {
      const datos = {
        "gender": Number(document.getElementById("gender").value),
        "age": Number(document.getElementById("age").value),
        "height(cm)": Number(document.getElementById("height").value),
        "weight(kg)": Number(document.getElementById("weight").value),
        "hemoglobin": Number(document.getElementById("hemoglobin").value),
        "triglyceride": Number(document.getElementById("triglyceride").value),
        "Gtp": Number(document.getElementById("Gtp").value)
      };

      const r = await fetch("/api/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(datos)
      });
      const res = await r.json();

      const box = document.getElementById("resultado");
      const texto = document.getElementById("texto");
      const prob = document.getElementById("prob");
      box.style.display = "block";
      if (res.fuma) {
        box.className = "fuma";
        texto.textContent = "🚬 PROBABLEMENTE FUMA";
      } else {
        box.className = "nofuma";
        texto.textContent = "✅ PROBABLEMENTE NO FUMA";
      }
      prob.textContent = "Probabilidad de fumar: " + Math.round(res.probabilidad * 100) + "%";
    }
  </script>
</body>
</html>
